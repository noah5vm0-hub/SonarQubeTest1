name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud: # 將工作名稱改為 sonarcloud 更直覺
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      # ----------------------------------------------------
      # 修改增加點 1：在雲端伺服器上安裝 Python 環境
      # ----------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 可依據你專案的 Python 版本調整

      # ----------------------------------------------------
      # 修改增加點 2：安裝 pytest、執行測試並產出覆蓋率報告
      # ----------------------------------------------------
      - name: Run tests and generate coverage report
        run: |
          pip install --only-binary :all: pytest==8.2.2 pytest-cov==5.0.0
          pytest --cov=. --cov-report=xml

      # ----------------------------------------------------
      # 修改增加點 3：改用 SonarCloud 官方 Action，並補上 GITHUB_TOKEN
      # ----------------------------------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3 # 換成雲端專用的 Action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # GitHub 自動注入，不用手動去 Settings 設定
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}     # 你之前在 Settings 設定好的 SonarCloud Token
